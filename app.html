<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TaskTimeline Pro — Free Plan | Visual Gantt Chart Tool</title>
  <meta name="description" content="Free visual Gantt chart tool. Add tasks, assign owners, track progress, and share with a link. No signup required."/>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- React 18 UMD builds -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <style>
    /* Smooth fonts */
    body { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
  </style>
</head>
<body class="bg-gray-50">
  <div id="root"></div>
  <script>
    // Utilities
    function dateOnly(d) {
      if (!d) return "";
      const dt = new Date(d);
      const y = dt.getFullYear();
      const m = String(dt.getMonth() + 1).padStart(2, "0");
      const da = String(dt.getDate()).padStart(2, "0");
      return `${y}-${m}-${da}`;
    }
    function daysBetween(a, b) {
      const ms = 24 * 60 * 60 * 1000;
      return Math.round((new Date(dateOnly(b)) - new Date(dateOnly(a))) / ms);
    }
    function addDays(d, n) {
      const dt = new Date(d);
      dt.setDate(dt.getDate() + n);
      return dateOnly(dt);
    }

    const FREE_TASK_LIMIT = 10;
    const UPGRADE_URL = "https://nkusib.github.io/rwandatask-timeline/#pricing";
    const STATUSES = ["Planned","In Progress","Blocked","Done"];

    const sampleTasks = [
      {
        id: (crypto && crypto.randomUUID ? crypto.randomUUID() : String(Math.random())),
        title: "Kickoff & scope",
        owner: "Jean",
        start: dateOnly(new Date()),
        end: dateOnly(addDays(new Date(), 3)),
        status: "In Progress",
        notes: "Initial alignment with stakeholders."
      },
      {
        id: (crypto && crypto.randomUUID ? crypto.randomUUID() : String(Math.random())),
        title: "Requirements sign-off",
        owner: "Laurence",
        start: dateOnly(addDays(new Date(), 2)),
        end: dateOnly(addDays(new Date(), 7)),
        status: "Planned",
        notes: "Collect inputs and finalize BRD."
      },
      {
        id: (crypto && crypto.randomUUID ? crypto.randomUUID() : String(Math.random())),
        title: "MVP build",
        owner: "Yves",
        start: dateOnly(addDays(new Date(), 5)),
        end: dateOnly(addDays(new Date(), 20)),
        status: "Planned",
        notes: "Core features for demo."
      }
    ];

    function App() {
      const React = window.React;
      const ReactDOM = window.ReactDOM;
      const { useEffect, useMemo, useState } = React;

      const [tasks, setTasks] = useState(() => {
        // Load from URL first
        const urlData = new URLSearchParams(window.location.search).get("data");
        if (urlData) {
          try {
            const parsed = JSON.parse(atob(decodeURIComponent(urlData)));
            if (Array.isArray(parsed)) return parsed;
          } catch (e) {}
        }
        // Then from localStorage
        const raw = localStorage.getItem("ttb.tasks");
        if (raw) {
          try {
            const parsed = JSON.parse(raw);
            if (Array.isArray(parsed)) return parsed;
          } catch (e) {}
        }
        return sampleTasks;
      });

      const [filters, setFilters] = useState({ owner: "All", status: "All", q: "" });
      const [form, setForm] = useState({ id: null, title: "", owner: "", start: "", end: "", status: "Planned", notes: "" });
      const [showForm, setShowForm] = useState(false);
      const [copied, setCopied] = useState(false);
      const [showUpgrade, setShowUpgrade] = useState(false);

      useEffect(() => {
        localStorage.setItem("ttb.tasks", JSON.stringify(tasks));
      }, [tasks]);

      const owners = useMemo(() => {
        const set = new Set(tasks.map(t => t.owner).filter(Boolean));
        return ["All", ...Array.from(set)];
      }, [tasks]);

      const filtered = useMemo(() => {
        return tasks.filter(t => {
          const ownerOk = filters.owner === "All" || t.owner === filters.owner;
          const statusOk = filters.status === "All" || t.status === filters.status;
          const q = filters.q.trim().toLowerCase();
          const qOk = !q || [t.title, t.owner, t.notes].some(x => (x || "").toLowerCase().includes(q));
          return ownerOk && statusOk && qOk;
        });
      }, [tasks, filters]);

      const dateBounds = useMemo(() => {
        if (filtered.length === 0) {
          const today = dateOnly(new Date());
          return { start: today, end: addDays(today, 14) };
        }
        let min = filtered[0].start;
        let max = filtered[0].end || filtered[0].start;
        for (const t of filtered) {
          if (t.start && (!min || t.start < min)) min = t.start;
          const e = t.end || t.start;
          if (e && (!max || e > max)) max = e;
        }
        // padding
        const start = addDays(min, -2);
        const end = addDays(max, 2);
        return { start, end };
      }, [filtered]);

      const days = useMemo(() => {
        const n = Math.max(1, daysBetween(dateBounds.start, dateBounds.end));
        return Array.from({ length: n + 1 }, (_, i) => addDays(dateBounds.start, i));
      }, [dateBounds]);

      function resetForm() {
        setForm({ id: null, title: "", owner: "", start: "", end: "", status: "Planned", notes: "" });
      }
      function openCreate() {
        if (tasks.length >= FREE_TASK_LIMIT) { setShowUpgrade(true); return; }
        resetForm(); setShowForm(true);
      }
      function openEdit(task) { setForm(task); setShowForm(true); }
      function saveTask(e) {
        e.preventDefault();
        const payload = { ...form };
        if (!payload.title || !payload.owner || !payload.start) return;
        if (!payload.id) {
          payload.id = (crypto && crypto.randomUUID ? crypto.randomUUID() : String(Math.random()));
          setTasks(prev => [...prev, payload]);
        } else {
          setTasks(prev => prev.map(t => (t.id === payload.id ? payload : t)));
        }
        setShowForm(false);
        resetForm();
      }
      function deleteTask(id) { setTasks(prev => prev.filter(t => t.id !== id)); }
      function exportJSON() {
        const blob = new Blob([JSON.stringify(tasks, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `tasks-${Date.now()}.json`;
        a.click();
        URL.revokeObjectURL(url);
      }
      function importJSON(evt) {
        const file = evt.target.files && evt.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
          try {
            const parsed = JSON.parse(reader.result);
            if (Array.isArray(parsed)) setTasks(parsed);
          } catch (e) { alert("Invalid JSON file"); }
        };
        reader.readAsText(file);
        evt.target.value = "";
      }
      function copyShareLink() {
        const qs = new URLSearchParams(window.location.search);
        qs.set("data", encodeURIComponent(btoa(JSON.stringify(tasks))));
        const link = `${window.location.origin}${window.location.pathname}?${qs.toString()}`;
        navigator.clipboard.writeText(link).then(() => {
          setCopied(true);
          setTimeout(() => setCopied(false), 1500);
        });
      }

      return React.createElement(
        "div", { className: "min-h-screen bg-gray-50 text-gray-900" },

        // Upgrade modal
        showUpgrade && React.createElement("div", { className: "fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50", onClick: () => setShowUpgrade(false) },
          React.createElement("div", { className: "w-full max-w-md bg-white rounded-2xl shadow-xl p-6 text-center", onClick: e => e.stopPropagation() },
            React.createElement("div", { className: "w-12 h-12 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center text-2xl mx-auto mb-4" }, "🚀"),
            React.createElement("h2", { className: "text-xl font-bold mb-2" }, "You've reached the free plan limit"),
            React.createElement("p", { className: "text-gray-500 text-sm mb-6" }, "You have ", FREE_TASK_LIMIT, " tasks — the maximum on the free plan. Upgrade to Pro for unlimited tasks, unlimited projects, CSV/PDF export, and more."),
            React.createElement("a", { href: UPGRADE_URL, className: "block w-full py-3 rounded-xl bg-gradient-to-r from-sky-500 to-purple-600 text-white font-bold text-sm hover:opacity-90 mb-3" }, "Upgrade to Pro — $19/month →"),
            React.createElement("button", { onClick: () => setShowUpgrade(false), className: "text-sm text-gray-400 hover:text-gray-600" }, "Maybe later")
          )
        ),

        // Free plan banner
        React.createElement("div", { className: "bg-gradient-to-r from-sky-500 to-purple-600 text-white text-center py-2 px-4 text-xs font-medium flex items-center justify-center gap-3" },
          React.createElement("span", null, `Free Plan: ${tasks.length} / ${FREE_TASK_LIMIT} tasks used.`),
          React.createElement("a", { href: UPGRADE_URL, className: "underline font-bold" }, "Upgrade to Pro for unlimited →")
        ),

        React.createElement("header", { className: "sticky top-0 z-10 bg-white/80 backdrop-blur border-b" },
          React.createElement("div", { className: "max-w-6xl mx-auto px-4 py-3 flex items-center gap-3" },
            React.createElement("a", { href: UPGRADE_URL, className: "w-8 h-8 rounded-xl bg-gradient-to-br from-sky-500 to-purple-600 text-white flex items-center justify-center font-bold text-sm flex-shrink-0" }, "T"),
            React.createElement("div", null,
              React.createElement("h1", { className: "text-xl font-semibold leading-tight" }, "TaskTimeline Pro"),
              React.createElement("p", { className: "text-xs text-gray-500" }, "Free Gantt timeline — plan tasks, assign owners, share with a link.")
            ),
            React.createElement("div", { className: "ml-auto flex items-center gap-2" },
              React.createElement("a", { href: UPGRADE_URL, className: "px-3 py-2 rounded-xl text-sm font-semibold text-white bg-gradient-to-r from-sky-500 to-purple-600 hover:opacity-90 shadow" }, "⬆ Upgrade to Pro"),
              React.createElement("button", { onClick: openCreate, className: "px-3 py-2 rounded-xl bg-gray-900 text-white text-sm hover:bg-gray-800 shadow" }, tasks.length >= FREE_TASK_LIMIT ? "Task limit reached" : "+ New Task"),
              React.createElement("button", { onClick: exportJSON, className: "px-3 py-2 rounded-xl bg-white text-sm border hover:bg-gray-50" }, "Export JSON"),
              React.createElement("label", { className: "px-3 py-2 rounded-xl bg-white text-sm border hover:bg-gray-50 cursor-pointer" },
                "Import JSON",
                React.createElement("input", { type: "file", accept: "application/json", className: "hidden", onChange: importJSON })
              ),
              React.createElement("button", { onClick: copyShareLink, className: "px-3 py-2 rounded-xl bg-white text-sm border hover:bg-gray-50" }, copied ? "Copied!" : "Copy Share Link")
            )
          )
        ),
        React.createElement("main", { className: "max-w-6xl mx-auto p-4" },
          // Filters
          React.createElement("div", { className: "flex flex-wrap items-end gap-3 mb-4" },
            React.createElement("div", { className: "flex flex-col" },
              React.createElement("label", { className: "text-xs text-gray-500" }, "Owner"),
              React.createElement("select", { className: "border rounded-xl px-3 py-2 bg-white", value: owners.includes(filters.owner) ? filters.owner : "All", onChange: e => setFilters(f => ({ ...f, owner: e.target.value })) },
                owners.map(o => React.createElement("option", { key: o, value: o }, o))
              )
            ),
            React.createElement("div", { className: "flex flex-col" },
              React.createElement("label", { className: "text-xs text-gray-500" }, "Status"),
              React.createElement("select", { className: "border rounded-xl px-3 py-2 bg-white", value: filters.status, onChange: e => setFilters(f => ({ ...f, status: e.target.value })) },
                ["All", ...STATUSES].map(s => React.createElement("option", { key: s, value: s }, s))
              )
            ),
            React.createElement("div", { className: "flex-1 min-w-[180px] flex flex-col" },
              React.createElement("label", { className: "text-xs text-gray-500" }, "Search"),
              React.createElement("input", { className: "border rounded-xl px-3 py-2 bg-white", placeholder: "Title, owner, notes…", value: filters.q, onChange: e => setFilters(f => ({ ...f, q: e.target.value })) })
            ),
            React.createElement("div", { className: "ml-auto text-sm text-gray-600" }, "Showing ", React.createElement("span", { className: "font-medium" }, filtered.length), " of ", tasks.length)
          ),
          // Timeline table
          React.createElement("div", { className: "overflow-x-auto bg-white border rounded-2xl shadow-sm" },
            React.createElement("div", { className: "grid", style: { gridTemplateColumns: `240px repeat(${days.length}, "minmax(36px, 1fr)")`.replace(/"/g, "") } },
              React.createElement("div", { className: "px-3 py-2 text-xs font-semibold border-b sticky left-0 bg-white z-[1] rounded-tl-2xl" }, "Task"),
              days.map((d, i) => React.createElement("div", { key: d, className: `px-1 py-2 text-[10px] text-center border-b ${i % 7 === 0 ? 'bg-gray-50 font-semibold' : ''}` }, d.slice(5))),
              filtered.map((t, idx) => {
                const start = t.start || dateBounds.start;
                const end = t.end || t.start || dateBounds.end;
                const offset = Math.max(0, daysBetween(dateBounds.start, start));
                const span = Math.max(1, daysBetween(start, end) + 1);
                return [
                  React.createElement("div", { key: t.id+"_info", className: `px-3 py-3 border-t flex items-start gap-3 sticky left-0 bg-white z-[1] ${idx === filtered.length - 1 ? 'rounded-bl-2xl' : ''}` },
                    React.createElement("div", { className: "flex-1" },
                      React.createElement("div", { className: "font-medium text-sm leading-tight" }, t.title),
                      React.createElement("div", { className: "text-xs text-gray-500" }, "Owner: ", React.createElement("span", { className: "font-medium" }, t.owner || "—")),
                      React.createElement("div", { className: "text-[11px] text-gray-500" }, (t.start||"") + " → " + (t.end || t.start || ""))
                    ),
                    React.createElement("span", { className: `text-[11px] px-2 py-1 rounded-full border ${t.status === 'Done' ? 'bg-emerald-50 text-emerald-700 border-emerald-200' : t.status === 'In Progress' ? 'bg-blue-50 text-blue-700 border-blue-200' : t.status === 'Blocked' ? 'bg-rose-50 text-rose-700 border-rose-200' : 'bg-amber-50 text-amber-700 border-amber-200'}` }, t.status),
                    React.createElement("div", { className: "flex items-center gap-2" },
                      React.createElement("button", { onClick: () => openEdit(t), className: "text-xs px-2 py-1 rounded-lg border hover:bg-gray-50" }, "Edit"),
                      React.createElement("button", { onClick: () => deleteTask(t.id), className: "text-xs px-2 py-1 rounded-lg border hover:bg-gray-50" }, "Delete")
                    )
                  ),
                  ...days.map((d, i) => React.createElement("div", { key: d + t.id, className: `relative border-t ${i % 7 === 0 ? 'bg-gray-50' : ''}` },
                    i === offset && React.createElement("div", { className: "absolute inset-y-1 left-1 right-1 rounded-xl shadow-sm", style: { gridColumnStart: i + 2, width: `calc(${span} * 100%)`, position: 'absolute' } },
                      React.createElement("div", { className: `h-full w-full rounded-xl border flex items-center justify-between px-2 text-[11px] overflow-hidden ${t.status === 'Done' ? 'bg-emerald-100/70 border-emerald-200' : t.status === 'In Progress' ? 'bg-blue-100/70 border-blue-200' : t.status === 'Blocked' ? 'bg-rose-100/70 border-rose-200' : 'bg-amber-100/70 border-amber-200'}` },
                        React.createElement("span", { className: "truncate" }, t.title),
                        React.createElement("span", { className: "opacity-60" }, span + "d")
                      )
                    )
                  ))
                ]
              })
            )
          ),
          // Form drawer
          showForm && React.createElement("div", { className: "fixed inset-0 bg-black/30 flex items-end sm:items-center justify-center p-4", onClick: () => setShowForm(false) },
            React.createElement("div", { className: "w-full max-w-2xl bg-white rounded-2xl shadow-xl", onClick: e => e.stopPropagation() },
              React.createElement("div", { className: "p-4 border-b flex items-center" },
                React.createElement("h2", { className: "text-lg font-semibold" }, form.id ? "Edit Task" : "New Task"),
                React.createElement("button", { className: "ml-auto text-sm px-3 py-1 rounded-lg border hover:bg-gray-50", onClick: () => setShowForm(false) }, "Close")
              ),
              React.createElement("form", { onSubmit: saveTask, className: "p-4 grid grid-cols-1 sm:grid-cols-2 gap-4" },
                React.createElement("div", { className: "flex flex-col gap-1" },
                  React.createElement("label", { className: "text-xs text-gray-500" }, "Title *"),
                  React.createElement("input", { className: "border rounded-xl px-3 py-2", value: form.title, onChange: e => setForm(f => ({ ...f, title: e.target.value })) , required: true })
                ),
                React.createElement("div", { className: "flex flex-col gap-1" },
                  React.createElement("label", { className: "text-xs text-gray-500" }, "Owner *"),
                  React.createElement("input", { className: "border rounded-xl px-3 py-2", value: form.owner, onChange: e => setForm(f => ({ ...f, owner: e.target.value })) , required: true })
                ),
                React.createElement("div", { className: "flex flex-col gap-1" },
                  React.createElement("label", { className: "text-xs text-gray-500" }, "Start date *"),
                  React.createElement("input", { type: "date", className: "border rounded-xl px-3 py-2", value: form.start, onChange: e => setForm(f => ({ ...f, start: e.target.value })) , required: true })
                ),
                React.createElement("div", { className: "flex flex-col gap-1" },
                  React.createElement("label", { className: "text-xs text-gray-500" }, "End date"),
                  React.createElement("input", { type: "date", className: "border rounded-xl px-3 py-2", value: form.end, onChange: e => setForm(f => ({ ...f, end: e.target.value })) })
                ),
                React.createElement("div", { className: "flex flex-col gap-1" },
                  React.createElement("label", { className: "text-xs text-gray-500" }, "Status"),
                  React.createElement("select", { className: "border rounded-xl px-3 py-2", value: form.status, onChange: e => setForm(f => ({ ...f, status: e.target.value })) },
                    STATUSES.map(s => React.createElement("option", { key: s, value: s }, s))
                  )
                ),
                React.createElement("div", { className: "flex flex-col gap-1 sm:col-span-2" },
                  React.createElement("label", { className: "text-xs text-gray-500" }, "Notes"),
                  React.createElement("textarea", { rows: 3, className: "border rounded-xl px-3 py-2", value: form.notes, onChange: e => setForm(f => ({ ...f, notes: e.target.value })) })
                ),
                React.createElement("div", { className: "sm:col-span-2 flex items-center justify-end gap-2" },
                  React.createElement("button", { type: "button", onClick: () => { setShowForm(false); resetForm(); }, className: "px-4 py-2 rounded-xl border hover:bg-gray-50" }, "Cancel"),
                  React.createElement("button", { type: "submit", className: "px-4 py-2 rounded-xl bg-gray-900 text-white hover:bg-gray-800" }, "Save")
                )
              )
            )
          ),
          // Help card
          React.createElement("div", { className: "mt-6 text-sm text-gray-600 bg-white border rounded-2xl p-4" },
            React.createElement("div", { className: "font-semibold mb-1" }, "Tips"),
            React.createElement("ul", { className: "list-disc ml-5 space-y-1" },
              React.createElement("li", null, "Use ", React.createElement("span", { className: "font-medium" }, "Copy Share Link"), " to generate a shareable URL with your tasks encoded — no server needed."),
              React.createElement("li", null, "Assign owners and set dates; colored bars reflect each task's status."),
              React.createElement("li", null, "Import/Export JSON to collaborate offline or back up your data."),
              React.createElement("li", null, "Filter by owner or status to focus the timeline.")
            )
          ),
          // Upgrade CTA
          React.createElement("div", { className: "mt-4 rounded-2xl border-2 border-blue-100 bg-gradient-to-r from-sky-50 to-purple-50 p-5 flex flex-col sm:flex-row items-start sm:items-center gap-4" },
            React.createElement("div", { className: "flex-1" },
              React.createElement("div", { className: "font-bold text-gray-900 mb-1" }, "Want unlimited projects & tasks?"),
              React.createElement("p", { className: "text-xs text-gray-500" }, "Pro plan unlocks unlimited projects, unlimited tasks, CSV/PDF export, team collaboration, and priority support. Flat $19/month — not per seat.")
            ),
            React.createElement("a", { href: UPGRADE_URL, className: "shrink-0 px-5 py-2.5 rounded-xl bg-gradient-to-r from-sky-500 to-purple-600 text-white font-bold text-sm hover:opacity-90" }, "Start free trial →")
          )
        )
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(React.createElement(App));
  </script>
</body>
</html>
